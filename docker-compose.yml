services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: initiatives-app
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: initiatives-postgres
    environment:
      POSTGRES_DB: initiatives
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: initiatives-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: initiatives-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data: